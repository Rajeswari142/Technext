<!DOCTYPE html>
<html>
<head>
    <title>My Store</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            margin: 0;
        }

        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-buttons a {
            margin-left: 10px;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
        }

        .cart-btn {
            background: #e74c3c;
        }

        .wishlist-btn {
            background: #e91e63;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 260px;
            margin: 15px;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }

        .price {
            color: green;
            font-weight: bold;
            margin-top: 5px;
        }

        .description {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
            margin-top: 10px;
            min-height: 50px;
        }

        .read-more {
            display: block;
            margin-top: 5px;
            font-size: 12px;
            color: #3498db;
            cursor: pointer;
            text-decoration: none;
        }

        .btn {
            display: block;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
        }

        .cart {
            background: #3498db;
        }

        .wishlist {
            background: #e91e63;
        }
    </style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<div class="navbar">
    <h2>🛒 TechNest</h2>

    <div class="nav-buttons">
        <a href="{% url 'view_cart' %}" class="cart-btn">
            Cart: {{ cart_count }}
        </a>

        <a href="{% url 'view_wishlist' %}" class="wishlist-btn">
            ❤️ Wishlist
        </a>
    </div>
</div>

<!-- 🛍️ PRODUCTS -->
<div class="container">

{% for product in products %}
    <div class="card">

        {% if product.image %}
            <img src="{{ product.image.url }}">
        {% else %}
            <img src="https://via.placeholder.com/260x180">
        {% endif %}

        <h3>{{ product.name }}</h3>

        <!-- ✨ DESCRIPTION WITH READ MORE -->
        <p class="description">
            <span class="short-text">
                {{ product.description|truncatechars:80 }}
            </span>

            <span class="full-text" style="display:none;">
                {{ product.description }}
            </span>

            <a href="#" class="read-more" onclick="toggleText(this); return false;">
                Read more
            </a>
        </p>

        <p class="price">₹{{ product.price }}</p>

        <!-- 🛒 ADD TO CART -->
        <a href="{% url 'add_to_cart' product.id %}" class="btn cart">
            Add to Cart
        </a>

        <!-- ❤️ ADD TO WISHLIST -->
        <a href="{% url 'add_to_wishlist' product.id %}" class="btn wishlist">
            ❤️ Add to Wishlist
        </a>

    </div>
{% endfor %}

</div>

<!-- ⚙️ JAVASCRIPT -->
<script>
function toggleText(btn) {
    const parent = btn.parentElement;
    const shortText = parent.querySelector('.short-text');
    const fullText = parent.querySelector('.full-text');

    if (fullText.style.display === "none") {
        fullText.style.display = "inline";
        shortText.style.display = "none";
        btn.innerText = "Read less";
    } else {
        fullText.style.display = "none";
        shortText.style.display = "inline";
        btn.innerText = "Read more";
    }
}
</script>

</body>
</html>
